kind = "web"
previewPath = "/"
title = "SIP4AI Manager"
version = "1.0.0"
id = "artifacts/sip4ai-manager"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23208

[services.development]
run = "pnpm --filter @workspace/sip4ai-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sip4ai-manager", "run", "build" ]
serve = "static"
publicDir = "artifacts/sip4ai-manager/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23208"
BASE_PATH = "/"
